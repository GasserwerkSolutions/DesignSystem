name: Update Visual Baselines

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-visual-baselines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser dependencies
        run: bash scripts/install-browser-deps.sh

      - name: Build JavaScript and tokens
        run: npm run build

      - name: Update visual baselines
        run: npm run check:visual:update

      - name: Verify visual baselines
        run: npm run check:visual

      - name: Commit updated baselines
        run: |
          if git diff --quiet -- tests/visual; then
            echo "No visual baseline changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual
          git commit -m "Update visual baselines"
          git push
