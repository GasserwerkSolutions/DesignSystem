name: Deploy Documentation Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build JS bundle
        run: npm run build:js

      - name: Build site (with deployment asset-root)
        env:
          DS_ASSET_ROOT: ./_ds/
        run: node scripts/build-site.js

      - name: Stage site root + DS assets under _ds/
        run: |
          mkdir -p _pages/_ds/dist/js
          cp -r dist/site/. _pages/
          cp main.css _pages/_ds/
          cp -r tokens semantic themes base components state _pages/_ds/
          cp dist/js/design-system.iife.js _pages/_ds/dist/js/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
