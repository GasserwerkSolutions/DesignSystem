name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser dependencies
        run: bash scripts/install-browser-deps.sh

      - name: Build JavaScript and tokens
        run: npm run build

      - name: Check website pattern contracts
        run: npm run check:patterns

      - name: Build documentation site
        run: npm run build:site

      - name: Check generated site links and assets
        run: npm run check:site:links

      - name: Check generated site rendering
        run: npm run check:site:responsive

      - name: Check generated site interactions
        run: npm run check:site

      - name: Add Pages marker
        run: touch dist/site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
